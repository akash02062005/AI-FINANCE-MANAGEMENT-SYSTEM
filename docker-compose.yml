services:
  client:
    build:
      context: ./client
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped

  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5000
      ML_SERVICE_URL: http://ml-service:8000
      CORS_ORIGIN: http://localhost:8080,http://127.0.0.1:8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5000:5000"
    depends_on:
      - redis
      - ml-service
    restart: unless-stopped

  ml-service:
    build:
      context: ./ml-service
    ports:
      - "8001:8000"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
